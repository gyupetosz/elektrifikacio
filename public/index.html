<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Elektrifikáció Asszisztens</title>
  <style>
    :root{
      --bg:#f5f7fb; --panel:#ffffff;
      --navy:#2f3a67; --navy-d:#1e2750; --gold:#d9a441;
      --muted:#8a8f98; --text:#1f2937;
      --bubble-user:#e8eefc; --bubble-bot:#ffffff;
      --ring:rgba(47,58,103,.15); --shadow:0 12px 40px rgba(16,24,40,.08);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);
         font:16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,"Helvetica Neue",Arial;}
    .shell{max-width:920px;margin:24px auto;background:var(--panel);border-radius:16px;
           box-shadow:var(--shadow);overflow:hidden}
    .header{background:linear-gradient(135deg,var(--navy),var(--navy-d));color:#fff;
            padding:14px 16px;display:flex;align-items:center;gap:10px}
    .brand{font-weight:800;letter-spacing:.2px}
    .badge{margin-left:auto;font-size:12px;opacity:.85;color:#f5e7b6}
    .chat{height:64vh;min-height:380px;background:#f8fafc;padding:18px;overflow-y:auto}
    /* chips */
    .chips{display:flex;flex-wrap:wrap;gap:10px;padding:10px 14px;background:#fff;border-top:1px solid #eef2f7}
    .chip{border:1px solid #e5e7eb;background:#f9fafb;color:#374151;border-radius:14px;padding:10px 12px;cursor:pointer}
    .chip:hover{background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.05)}
    /* composer */
    .composer{display:flex;gap:10px;padding:14px;background:#fff;border-top:1px solid #eef2f7}
    .input{flex:1;border:1px solid #e5e7eb;border-radius:14px;padding:12px 14px;outline:0}
    .input:focus{border-color:#dbe4f3;box-shadow:0 0 0 4px var(--ring)}
    .send{background:var(--navy);color:var(--gold);border:0;border-radius:12px;padding:0 18px;font-weight:700;cursor:pointer}
    .send:disabled{opacity:.6;cursor:not-allowed}
    .tip{font-size:12px;color:var(--muted);text-align:center;padding:6px 0 14px}
    /* bubbles */
    .row{display:flex;margin:8px 0}
    .row.user{justify-content:flex-end}
    .bubble{max-width:78%;padding:12px 14px;border-radius:var(--radius);box-shadow:0 2px 10px rgba(0,0,0,.04)}
    .user .bubble{background:var(--bubble-user);border-bottom-right-radius:6px}
    .bot  .bubble{background:var(--bubble-bot);border-bottom-left-radius:6px}
    .meta{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
    /* typing */
    .typing{display:inline-flex;align-items:center;gap:8px;color:var(--muted)}
    .dots{display:inline-flex;gap:4px}
    .dot{width:6px;height:6px;border-radius:50%;background:#9c7a25;opacity:.3;animation:blink 1.2s infinite ease-in-out}
    .dot:nth-child(2){animation-delay:.15s}
    .dot:nth-child(3){animation-delay:.3s}
	.cite {
 	 color: #94a3b8;
 	 font-size: 0.8em;
	}
    @keyframes blink{0%,80%,100%{opacity:.25}40%{opacity:1}}
    @media (max-width:640px){.shell{border-radius:0;margin:0}.chat{height:70vh}.bubble{max-width:86%}}
  </style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
<script src="https://unpkg.com/marked@12.0.2/marked.min.js"></script>
<script src="https://unpkg.com/dompurify@3.1.7/dist/purify.min.js"></script>
</head>
<body>
  <div class="shell">
    <div class="header">
      <div class="brand">Elektrifikáció Asszisztens</div>
      <div class="badge">RAG • HU</div>
    </div>

    <div id="chat" class="chat" aria-live="polite"></div>

    <div id="chips" class="chips"></div>

    <div class="composer">
      <input id="input" class="input" placeholder="Írd ide az üzeneted…" />
      <button id="send" class="send">Küldés</button>
    </div>
    <div class="tip">Tipp: kérdezz a hatótávról, töltésről vagy a szabályzatról.</div>
  </div>

<script>
  const chat  = document.getElementById('chat');
  const input = document.getElementById('input');
  const send  = document.getElementById('send');
  const chips = document.getElementById('chips');

  const QUESTIONS = [
    "Hogyan számolható a töltési idő?",
    "Hogyan számítható ki a hatótáv?",
    "Mi a különbség az AC és DC töltés között?",
    "Mit jelent a 11 kW AC töltés?",
    "Mik a legfontosabb tényezők, amelyek csökkentik a hatótávot?",
    "Hogyan optimalizálható az otthoni töltés költsége?",
    "Mi a különbség a kW és kWh között?",
    "Mit jelent a WLTP hatótáv?",
  ];

  // --- helpers
  const now = () => new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  const esc = s => String(s).replace(/[&<>\"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  // Hivatkozások [1] → felső indexben
  function prettifyCitations(s = '') {
    return s.replace(/\[(\d+)\]/g, '<sup class="cite">[$1]</sup>');
  }

  // KaTeX + citation render egy helyen
function renderAnswer(container, rawText) {
  // 1) Markdown -> HTML
  const mdHtml = marked.parse(String(rawText ?? ''));

  // 2) Biztonságosítás
  const safeHtml = DOMPurify.sanitize(mdHtml, { USE_PROFILES: { html: true } });

  // 3) [1] -> felső index
  const pretty = prettifyCitations(safeHtml);

  // 4) Beírás + KaTeX render
  container.innerHTML = `<span class="meta">Asszisztens • ${now()}</span>${pretty}`;
  if (window.renderMathInElement) {
    renderMathInElement(container, {
      delimiters: [
        { left: "$$", right: "$$", display: true },
        { left: "$",  right: "$",  display: false }
      ]
    });
  }
  chat.scrollTop = chat.scrollHeight;
}

  function addBubble(role, html) {
    const row = document.createElement('div'); row.className = 'row ' + role;
    const bubble = document.createElement('div'); bubble.className = 'bubble';
    bubble.innerHTML = html;
    row.appendChild(bubble); chat.appendChild(row); chat.scrollTop = chat.scrollHeight;
    return bubble;
  }

  function addUser(text) {
    // a felhasználói üzenetet továbbra is escape-eljük
    addBubble('user', `<span class="meta">Te • ${now()}</span>${esc(text)}`);
  }

  function addTyping() {
    return addBubble('bot', `
      <span class="meta">Asszisztens • ${now()}</span>
      <span class="typing">Gondolkodom… <span class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span></span>
    `);
  }

  function renderChips() {
    chips.innerHTML = '';
    QUESTIONS.slice(0,4).forEach(q => {
      const btn = document.createElement('button');
      btn.className = 'chip'; btn.textContent = q; btn.title = q;
      btn.onclick = () => { input.value = q; doSend(); };
      chips.appendChild(btn);
    });
  }

  async function doSend() {
    const text = input.value.trim();
    if (!text) return;

    addUser(text);
    input.value = '';
    input.focus();

    const typing = addTyping();
    send.disabled = true;

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type':'application/json' },
        body: JSON.stringify({ messages:[{ role:'user', content:text }] })
      });

      const ctype = (res.headers.get('content-type') || '').toLowerCase();

      // 1) JSON válasz esetén: NINCS ESCAPE -> KaTeX + citations
      if (ctype.includes('application/json')) {
        const data = await res.json();
        const reply = data?.reply ?? data?.answer ?? 'Nincs válasz.';
        renderAnswer(typing, reply);
        return;
      }

      // 2) Stream esetén: közben plain text, a végén KaTeX render
      if (res.body && res.body.getReader) {
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let done = false, acc = '';

        while (!done) {
          const { value, done: d } = await reader.read();
          done = d;
          acc += decoder.decode(value || new Uint8Array(), { stream:true });
          // közben egyszerűen kiírjuk (escape-elve, hogy ne villogjon a KaTeX)
          typing.innerHTML = `<span class="meta">Asszisztens • ${now()}</span>${esc(acc)}`;
          chat.scrollTop = chat.scrollHeight;
        }

        // végén szépen rendereljük
        // ha a szerver JSON-t streamelt, próbáljuk parse-olni
        try {
          const maybe = JSON.parse(acc);
          const reply = maybe?.reply ?? maybe?.answer ?? acc;
          renderAnswer(typing, reply);
        } catch {
          renderAnswer(typing, acc);
        }
        return;
      }

      // 3) Fallback: text
      const textBody = await res.text();
      if (textBody.trim().startsWith('{')) {
        try {
          const data = JSON.parse(textBody);
          const reply = data?.reply ?? data?.answer ?? textBody;
          renderAnswer(typing, reply);
          return;
        } catch {}
      }
      renderAnswer(typing, textBody || 'Nincs válasz.');
    } catch (err) {
      typing.innerHTML = `<span class="meta">Asszisztens • ${now()}</span>⚠️ Hiba: ${esc(err?.message || String(err))}`;
    } finally {
      send.disabled = false;
    }
  }

  send.addEventListener('click', doSend);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') doSend(); });

  renderChips();
</script>
</body>
</html>
